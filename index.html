
<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23ff0055'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f5f7;
            --surface-color: #ffffff;
            --text-color: #3c4043;
            --text-muted: #70757a;
            --border-color: #dadce0;
            --hover-color: #e8eaed;
            --font-main: 'Montserrat', sans-serif;
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="dark"] {
            --bg-color: #18191a;
            --surface-color: #242526;
            --text-color: #e4e6eb;
            --text-muted: #b0b3b8;
            --border-color: #3a3b3c;
            --hover-color: #3a3b3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-smooth), color var(--transition-smooth);
            display: flex; flex-direction: column; 
            height: 111.11vh; width: 111.11vw; 
            transform: scale(0.9); transform-origin: top left;
            overflow: hidden;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            transition: background-color var(--transition-smooth), border-color var(--transition-smooth);
        }
        .month-selector { display: flex; align-items: center; gap: 15px; }
        h1 { font-weight: 500; font-size: 1.5rem; min-width: 200px; text-align: center; }
        .icon-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 1.2rem; cursor: pointer; padding: 10px; border-radius: 50%;
            transition: background-color var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
        }
        .icon-btn:hover { background-color: var(--hover-color); color: var(--text-color); }
        .settings-container { position: relative; }
        .gear-icon { transition: transform 0.4s ease; }
        .settings-container.open .gear-icon { transform: rotate(90deg); }
        .settings-dropdown {
            position: absolute; right: 0; top: 100%; margin-top: 10px;
            background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            min-width: 260px; opacity: 0; transform: translateY(-10px) scale(0.95);
            pointer-events: none; transition: opacity var(--transition-fast), transform var(--transition-fast);
            z-index: 50; padding: 8px 0;
        }
        .settings-container.open .settings-dropdown { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        .dropdown-item { padding: 12px 20px; font-size: 0.9rem; cursor: pointer; transition: background var(--transition-fast); }
        .dropdown-item:hover { background: var(--hover-color); }
        .dropdown-section { padding: 12px 20px; border-top: 1px solid var(--border-color); }
        .dropdown-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
        
        .custom-select {
            width: 100%; padding: 8px 12px; background: var(--bg-color); color: var(--text-color);
            border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-main);
            outline: none; cursor: pointer; transition: border-color var(--transition-fast);
        }
        .custom-select:focus { border-color: #4285f4; }

        .calendar-container { flex: 1; padding: 20px 40px; display: flex; flex-direction: column; height: calc(100vh - 85px); }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: 500; color: var(--text-muted); padding-bottom: 10px; }
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(5, 1fr); gap: 1px;
            background-color: var(--border-color); border: 1px solid var(--border-color);
            border-radius: 12px; overflow: hidden; flex: 1; transition: opacity var(--transition-smooth);
        }
        .calendar-grid.fade { opacity: 0; transform: translateY(5px); }
        .day {
            background-color: var(--surface-color); padding: 6px 4px; cursor: pointer;
            transition: background-color var(--transition-fast); display: flex; flex-direction: column; 
            align-items: stretch; gap: 3px; overflow-y: auto; scrollbar-width: none; 
        }
        .day::-webkit-scrollbar { display: none; } 
        .day:hover { background-color: var(--hover-color); }
        .day-number { font-size: 0.85rem; font-weight: 500; align-self: center; margin-bottom: 4px; color: var(--text-color); }
        .day.empty { background-color: var(--bg-color); cursor: default; }
        .event {
            font-size: 0.75rem; color: #fff; padding: 4px 8px; border-radius: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: transform 0.2s, filter 0.2s; width: 100%; display: block;
        }
        .event:hover { transform: scale(1.01); filter: brightness(1.1); }

        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px);
            align-items: center; justify-content: center; opacity: 0; transition: opacity var(--transition-fast); z-index: 100;
        }
        .modal.show { display: flex; opacity: 1; }
        .modal-content {
            background-color: var(--surface-color); padding: 24px; border-radius: 16px; width: 350px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal.show .modal-content { transform: scale(1); }
        .modal-content.small { width: 300px; text-align: center; }
        .modal-content h2, .modal-content h3 { font-weight: 600; margin-bottom: 5px; }
        .event-date-text { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px; }

        input[type="text"] {
            width: 100%; padding: 10px; margin-bottom: 15px; border: none; border-bottom: 2px solid var(--border-color);
            background: transparent; color: var(--text-color); font-family: var(--font-main); outline: none; transition: border-color var(--transition-fast);
        }
        input[type="text"]:focus { border-bottom-color: #4285f4; }

        /* Custom Time Picker UI */
        .custom-time-wrapper { position: relative; margin-bottom: 15px; width: 100%; }
        .time-input-box {
            width: 100%; padding: 10px; border-bottom: 2px solid var(--border-color); background: transparent; 
            color: var(--text-color); font-family: var(--font-main); cursor: pointer; display: flex; 
            justify-content: space-between; align-items: center; transition: border-color var(--transition-fast);
        }
        .time-input-box:hover { border-bottom-color: #4285f4; }
        .clear-time-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; display: none; }
        .clear-time-btn:hover { color: var(--text-color); }
        .time-dropdown {
            position: absolute; top: 100%; left: 0; width: 100%; height: 180px; background: var(--surface-color); 
            border: 1px solid var(--border-color); border-radius: 12px; display: flex; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            opacity: 0; transform: translateY(-10px); pointer-events: none; transition: opacity var(--transition-fast), transform var(--transition-fast);
            z-index: 10; overflow: hidden; margin-top: 5px;
        }
        .time-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .time-col { flex: 1; overflow-y: auto; scrollbar-width: none; border-right: 1px solid var(--border-color); }
        .time-col:last-child { border-right: none; }
        .time-col::-webkit-scrollbar { display: none; }
        .time-option { padding: 12px; text-align: center; cursor: pointer; transition: background var(--transition-fast); font-size: 0.9rem; }
        .time-option:hover { background: var(--hover-color); }
        .time-option.selected { background: #4285f4; color: white; font-weight: 600; }

        .color-picker { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .color-option { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; transition: transform 0.2s; border: 1px solid rgba(0,0,0,0.1); }
        .color-option.selected { transform: scale(1.3); box-shadow: 0 0 0 2px var(--surface-color), 0 0 0 4px var(--text-color); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .modal-content.small .modal-actions { justify-content: center; flex-wrap: wrap; }
        .btn-text, .btn-primary, .btn-danger {
            padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer;
            font-family: var(--font-main); font-weight: 500; transition: background-color var(--transition-fast), transform var(--transition-fast);
        }
        .btn-text { background: transparent; color: var(--text-muted); }
        .btn-text:hover { background: var(--hover-color); }
        .btn-primary { background: #4285f4; color: white; }
        .btn-primary:hover { background: #3367d6; transform: translateY(-1px); }
        .btn-danger { background: #ea4335; color: white; }
        .btn-danger:hover { background: #d33426; transform: translateY(-1px); }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="month-selector">
            <button id="prevMonth" class="icon-btn">&#10094;</button>
            <h1 id="monthDisplay">Mes Año</h1>
            <button id="nextMonth" class="icon-btn">&#10095;</button>
        </div>
        <div class="settings-container" id="settingsContainer">
            <button id="settingsBtn" class="icon-btn gear-icon" title="Configuración">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
            <div class="settings-dropdown">
                <div class="dropdown-item" id="themeToggleBtn">Modo Claro / Oscuro</div>
                <div class="dropdown-item" id="importIcsMenuBtn">Importar calendario (.ics)</div>
                <div class="dropdown-item" id="clearAllBtn">Borrar todos los eventos</div>
                
                <div class="dropdown-section">
                    <div class="dropdown-label">La semana empieza el:</div>
                    <select id="startDaySelect" class="custom-select">
                        <option value="1">Lunes</option>
                        <option value="0">Domingo</option>
                    </select>
                </div>

                <div class="dropdown-section">
                    <div class="dropdown-label">Color predeterminado:</div>
                    <div class="color-picker" id="defaultColorPicker">
                        <div class="color-option" style="background: #4285f4;" data-color="#4285f4"></div>
                        <div class="color-option" style="background: #ea4335;" data-color="#ea4335"></div>
                        <div class="color-option" style="background: #fbbc04;" data-color="#fbbc04"></div>
                        <div class="color-option" style="background: #34a853;" data-color="#34a853"></div>
                        <div class="color-option" style="background: #3c4043;" data-color="#3c4043"></div>
                        <div class="color-option" style="background: #8e24aa;" data-color="#8e24aa"></div>
                        <div class="color-option" style="background: #00acc1;" data-color="#00acc1"></div>
                    </div>
                </div>
            </div>
            <input type="file" id="icsFileInput" accept=".ics" style="display: none;">
        </div>
    </header>

    <main class="calendar-container">
        <div class="weekdays" id="weekdaysContainer"></div>
        <div id="calendar" class="calendar-grid"></div>
    </main>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <h2 id="modalMainTitle">Nuevo Evento</h2>
            <p id="eventDateDisplay" class="event-date-text"></p>
            <input type="text" id="eventTitle" placeholder="Añade un título" autocomplete="off">
            
            <!-- Selector de Hora Personalizado -->
            <div class="custom-time-wrapper">
                <div class="time-input-box" id="timeInputBox">
                    <span id="timeDisplayTxt">Todo el día</span>
                    <button class="clear-time-btn" id="clearTimeBtn">&times;</button>
                </div>
                <div class="time-dropdown" id="timeDropdown">
                    <div class="time-col" id="hourList"></div>
                    <div class="time-col" id="minuteList"></div>
                </div>
            </div>

            <div class="color-picker" id="modalColorPicker">
                <div class="color-option" style="background: #4285f4;" data-color="#4285f4"></div>
                <div class="color-option" style="background: #ea4335;" data-color="#ea4335"></div>
                <div class="color-option" style="background: #fbbc04;" data-color="#fbbc04"></div>
                <div class="color-option" style="background: #34a853;" data-color="#34a853"></div>
                <div class="color-option" style="background: #3c4043;" data-color="#3c4043"></div>
                <div class="color-option" style="background: #8e24aa;" data-color="#8e24aa"></div>
                <div class="color-option" style="background: #00acc1;" data-color="#00acc1"></div>
            </div>
            <div class="modal-actions">
                <button id="cancelBtn" class="btn-text">Cancelar</button>
                <button id="saveBtn" class="btn-primary">Guardar</button>
            </div>
        </div>
    </div>

    <div id="actionModal" class="modal">
        <div class="modal-content small">
            <h3 id="actionEventTitle">Título del evento</h3>
            <p id="actionEventTime" class="event-date-text"></p>
            <div class="modal-actions">
                <button id="deleteEventBtn" class="btn-danger">Eliminar</button>
                <button id="editEventBtn" class="btn-primary">Editar</button>
                <button id="closeActionBtn" class="btn-text" style="width: 100%;">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const calendar = document.getElementById('calendar');
        const monthDisplay = document.getElementById('monthDisplay');
        const weekdaysContainer = document.getElementById('weekdaysContainer');
        const settingsContainer = document.getElementById('settingsContainer');
        const settingsBtn = document.getElementById('settingsBtn');
        const startDaySelect = document.getElementById('startDaySelect');
        const eventModal = document.getElementById('eventModal');
        const modalMainTitle = document.getElementById('modalMainTitle');
        const eventTitle = document.getElementById('eventTitle');
        const eventDateDisplay = document.getElementById('eventDateDisplay');
        const actionModal = document.getElementById('actionModal');
        const actionEventTitle = document.getElementById('actionEventTitle');
        const actionEventTime = document.getElementById('actionEventTime');
        const icsFileInput = document.getElementById('icsFileInput');
        const modalColors = document.querySelectorAll('#modalColorPicker .color-option');
        const defaultColors = document.querySelectorAll('#defaultColorPicker .color-option');

        // Variables Custom Time Picker
        const timeInputBox = document.getElementById('timeInputBox');
        const timeDisplayTxt = document.getElementById('timeDisplayTxt');
        const clearTimeBtn = document.getElementById('clearTimeBtn');
        const timeDropdown = document.getElementById('timeDropdown');
        const hourList = document.getElementById('hourList');
        const minuteList = document.getElementById('minuteList');

        let currentDate = new Date();
        let selectedDate = null;
        let editingIndex = null;
        let defaultColor = localStorage.getItem('calendarDefaultColor') || '#4285f4';
        let selectedColor = defaultColor;
        let isColorManuallyPicked = false; 
        let startOnMonday = localStorage.getItem('calendarStartMonday') !== 'false';
        let events = JSON.parse(localStorage.getItem('calendarEvents')) || {};

        let currentHour = '12';
        let currentMinute = '00';
        let hasTimeSet = false;

        const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        startDaySelect.value = startOnMonday ? "1" : "0";
        startDaySelect.addEventListener('change', (e) => {
            startOnMonday = e.target.value === "1";
            localStorage.setItem('calendarStartMonday', startOnMonday);
            renderCalendar();
        });

        // Custom Time Picker Lógica
        function renderTimeOptions() {
            hourList.innerHTML = ''; minuteList.innerHTML = '';
            for(let i=0; i<24; i++) {
                let val = i.toString().padStart(2, '0');
                let div = document.createElement('div');
                div.className = `time-option ${(val === currentHour && hasTimeSet) ? 'selected' : ''}`;
                div.textContent = val;
                div.onclick = (e) => { e.stopPropagation(); currentHour = val; hasTimeSet = true; updateTimeDisplay(); renderTimeOptions(); scrollToSelected(hourList); };
                hourList.appendChild(div);
            }
            for(let i=0; i<60; i++) {
                let val = i.toString().padStart(2, '0');
                let div = document.createElement('div');
                div.className = `time-option ${(val === currentMinute && hasTimeSet) ? 'selected' : ''}`;
                div.textContent = val;
                div.onclick = (e) => { e.stopPropagation(); currentMinute = val; hasTimeSet = true; updateTimeDisplay(); renderTimeOptions(); scrollToSelected(minuteList); };
                minuteList.appendChild(div);
            }
        }

        function updateTimeDisplay() {
            if(hasTimeSet) {
                timeDisplayTxt.textContent = `${currentHour}:${currentMinute}`;
                clearTimeBtn.style.display = 'block';
            } else {
                timeDisplayTxt.textContent = 'Todo el día (Añadir hora)';
                clearTimeBtn.style.display = 'none';
            }
        }

        function scrollToSelected(container) {
            setTimeout(() => {
                const selected = container.querySelector('.selected');
                if(selected) container.scrollTop = selected.offsetTop - container.offsetHeight/2 + selected.offsetHeight/2;
            }, 10);
        }

        function setTimeInPicker(timeStr) {
            if (timeStr) {
                hasTimeSet = true;
                [currentHour, currentMinute] = timeStr.split(':');
            } else {
                hasTimeSet = false;
                currentHour = '12'; currentMinute = '00';
            }
            updateTimeDisplay();
            renderTimeOptions();
        }

        function getSelectedTime() { return hasTimeSet ? `${currentHour}:${currentMinute}` : ''; }

        timeInputBox.onclick = (e) => {
            e.stopPropagation();
            timeDropdown.classList.toggle('open');
            if (timeDropdown.classList.contains('open')) {
                if (!hasTimeSet) { currentHour = '12'; currentMinute = '00'; }
                renderTimeOptions(); scrollToSelected(hourList); scrollToSelected(minuteList);
            }
        };

        clearTimeBtn.onclick = (e) => {
            e.stopPropagation(); hasTimeSet = false;
            updateTimeDisplay(); renderTimeOptions(); timeDropdown.classList.remove('open');
        };

        function initDefaultColorPicker() {
            defaultColors.forEach(opt => {
                if (opt.getAttribute('data-color') === defaultColor) opt.classList.add('selected');
                opt.addEventListener('click', (e) => {
                    e.stopPropagation(); defaultColors.forEach(o => o.classList.remove('selected'));
                    e.target.classList.add('selected'); defaultColor = e.target.getAttribute('data-color');
                    localStorage.setItem('calendarDefaultColor', defaultColor); renderCalendar(); 
                });
            });
        }

        function changeMonth(direction) { currentDate.setMonth(currentDate.getMonth() + direction); renderCalendar(); }

        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.key === 'ArrowLeft') changeMonth(-1);
            else if (e.key === 'ArrowRight') changeMonth(1);
        });

        function renderCalendar() {
            calendar.classList.add('fade');
            
            const daysOrder = startOnMonday ? ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'] : ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            weekdaysContainer.innerHTML = daysOrder.map(d => `<div>${d}</div>`).join('');

            setTimeout(() => {
                calendar.innerHTML = '';
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                monthDisplay.textContent = `${months[month]} ${year}`;
                
                const firstDay = new Date(year, month, 1).getDay();
                const adjustedFirstDay = startOnMonday ? (firstDay === 0 ? 6 : firstDay - 1) : firstDay;
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const totalCellsNeeded = adjustedFirstDay + daysInMonth;
                
                calendar.style.gridTemplateRows = totalCellsNeeded > 35 ? 'repeat(6, 1fr)' : 'repeat(5, 1fr)';
                
                for (let i = 0; i < adjustedFirstDay; i++) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.classList.add('day', 'empty');
                    calendar.appendChild(emptyDiv);
                }
                
                for (let i = 1; i <= daysInMonth; i++) {
                    const dayDiv = document.createElement('div');
                    dayDiv.classList.add('day');
                    const dayString = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    
                    const dayNumber = document.createElement('span');
                    dayNumber.classList.add('day-number');
                    dayNumber.textContent = i;
                    dayDiv.appendChild(dayNumber);
                    
                    if (events[dayString]) {
                        events[dayString].forEach((evt, index) => {
                            const eventDiv = document.createElement('div');
                            eventDiv.classList.add('event');
                            eventDiv.style.backgroundColor = evt.isManualColor ? evt.color : defaultColor;
                            eventDiv.textContent = `${evt.time ? evt.time + ' ' : ''}${evt.title}`;
                            eventDiv.title = evt.title; 
                            eventDiv.addEventListener('click', (e) => {
                                e.stopPropagation(); openActionModal(dayString, index, evt);
                            });
                            dayDiv.appendChild(eventDiv);
                        });
                    }
                    dayDiv.addEventListener('click', () => openCreateModal(dayString));
                    calendar.appendChild(dayDiv);
                }
                calendar.classList.remove('fade');
            }, 200);
        }

        modalColors.forEach(option => {
            option.addEventListener('click', (e) => {
                modalColors.forEach(opt => opt.classList.remove('selected'));
                e.target.classList.add('selected'); selectedColor = e.target.getAttribute('data-color');
                isColorManuallyPicked = true; 
            });
        });

        function openCreateModal(dateStr) {
            selectedDate = dateStr; editingIndex = null;
            modalMainTitle.textContent = "Nuevo Evento";
            eventDateDisplay.textContent = `Fecha: ${dateStr}`;
            eventTitle.value = ''; 
            setTimeInPicker('');
            isColorManuallyPicked = false; 
            setColorSelection(defaultColor); eventModal.classList.add('show');
        }

        function openActionModal(dateStr, index, evt) {
            selectedDate = dateStr; editingIndex = index;
            actionEventTitle.textContent = evt.title;
            actionEventTime.textContent = evt.time ? `Hora: ${evt.time}` : 'Todo el día';
            actionModal.classList.add('show');
        }

        function setColorSelection(hex) {
            selectedColor = hex;
            modalColors.forEach(opt => {
                opt.classList.remove('selected');
                if (opt.getAttribute('data-color') === hex) opt.classList.add('selected');
            });
        }

        document.getElementById('importIcsMenuBtn').addEventListener('click', () => { settingsContainer.classList.remove('open'); icsFileInput.click(); });
        icsFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) { parseICSAndSave(event.target.result); icsFileInput.value = ""; };
            reader.readAsText(file);
        });

        function parseICSAndSave(icsData) {
            const lines = icsData.split(/\r\n|\n|\r/);
            let currentEvent = null; let importedCount = 0;
            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('BEGIN:VEVENT')) { currentEvent = {}; }
                else if (line.startsWith('END:VEVENT') && currentEvent) {
                    if (currentEvent.date && currentEvent.title) {
                        if (!events[currentEvent.date]) events[currentEvent.date] = [];
                        const exists = events[currentEvent.date].some(e => e.title === currentEvent.title && e.time === (currentEvent.time || ''));
                        if (!exists) {
                            events[currentEvent.date].push({ title: currentEvent.title, time: currentEvent.time || '', color: defaultColor, isManualColor: false });
                            events[currentEvent.date].sort((a, b) => a.time.localeCompare(b.time)); importedCount++;
                        }
                    }
                    currentEvent = null;
                } else if (currentEvent) {
                    if (line.startsWith('SUMMARY:')) { currentEvent.title = line.substring(8).replace(/\\,/g, ','); }
                    else if (line.startsWith('DTSTART')) {
                        const valuePart = line.split(':')[1];
                        if (valuePart) {
                            currentEvent.date = `${valuePart.substring(0, 4)}-${valuePart.substring(4, 6)}-${valuePart.substring(6, 8)}`;
                            if (valuePart.includes('T')) {
                                const tIndex = valuePart.indexOf('T');
                                currentEvent.time = `${valuePart.substring(tIndex + 1, tIndex + 3)}:${valuePart.substring(tIndex + 3, tIndex + 5)}`;
                            }
                        }
                    }
                }
            }
            if (importedCount > 0) { localStorage.setItem('calendarEvents', JSON.stringify(events)); renderCalendar(); alert(`¡Se han importado ${importedCount} eventos!`); }
            else { alert('No se encontraron nuevos eventos.'); }
        }

        document.getElementById('prevMonth').addEventListener('click', () => changeMonth(-1));
        document.getElementById('nextMonth').addEventListener('click', () => changeMonth(1));
        
        settingsBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsContainer.classList.toggle('open'); });
        document.addEventListener('click', (e) => { 
            if (!settingsContainer.contains(e.target)) settingsContainer.classList.remove('open'); 
            if (!timeInputBox.contains(e.target) && !timeDropdown.contains(e.target)) timeDropdown.classList.remove('open');
        });
        
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            const html = document.documentElement;
            html.getAttribute('data-theme') === 'dark' ? html.removeAttribute('data-theme') : html.setAttribute('data-theme', 'dark');
            settingsContainer.classList.remove('open');
        });

        document.getElementById('clearAllBtn').addEventListener('click', () => {
            if(confirm('¿Seguro que quieres eliminar todos los eventos?')) { events = {}; localStorage.removeItem('calendarEvents'); renderCalendar(); }
            settingsContainer.classList.remove('open');
        });

        document.getElementById('closeActionBtn').addEventListener('click', () => actionModal.classList.remove('show'));
        document.getElementById('deleteEventBtn').addEventListener('click', () => {
            events[selectedDate].splice(editingIndex, 1);
            if (events[selectedDate].length === 0) delete events[selectedDate];
            localStorage.setItem('calendarEvents', JSON.stringify(events));
            actionModal.classList.remove('show'); renderCalendar();
        });

        document.getElementById('editEventBtn').addEventListener('click', () => {
            actionModal.classList.remove('show');
            const evt = events[selectedDate][editingIndex];
            modalMainTitle.textContent = "Editar Evento";
            eventDateDisplay.textContent = `Fecha: ${selectedDate}`;
            eventTitle.value = evt.title; 
            setTimeInPicker(evt.time);
            isColorManuallyPicked = evt.isManualColor || false;
            setColorSelection(evt.isManualColor ? evt.color : defaultColor); eventModal.classList.add('show');
        });

        document.getElementById('cancelBtn').addEventListener('click', () => eventModal.classList.remove('show'));
        document.getElementById('saveBtn').addEventListener('click', () => {
            if (eventTitle.value.trim() === '') return;
            if (!events[selectedDate]) events[selectedDate] = [];
            
            const newEvent = { title: eventTitle.value, time: getSelectedTime(), color: selectedColor, isManualColor: isColorManuallyPicked };
            
            if (editingIndex !== null) events[selectedDate][editingIndex] = newEvent;
            else events[selectedDate].push(newEvent);
            
            events[selectedDate].sort((a, b) => a.time.localeCompare(b.time));
            localStorage.setItem('calendarEvents', JSON.stringify(events));
            eventModal.classList.remove('show'); renderCalendar();
        });

        initDefaultColorPicker(); renderCalendar();
    </script>
</body>
</html
